name: Deploy Production CloudFormation Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.prod.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.prod.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file config/prod-stack.yaml \
            --stack-name cozyhomeaway-prod \
            --capabilities CAPABILITY_NAMED_IAM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.prod.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.prod.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
