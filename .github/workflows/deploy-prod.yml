name: Deploy Production CloudFormation Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      OIDC_ROLE_NAME: ${{ vars.OIDC_ROLE_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.OIDC_ROLE_NAME }}
          aws-region: us-east-1

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file config/prod-stack.yaml \
            --stack-name cozyhomeaway-ui-prod \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              OwnerName="${{ vars.OwnerName }}" \
              AppName="${{ vars.AppName }}" \
              AppDescription="${{ vars.AppDescription }}" \
            --tags \
              OwnerName="${{ vars.OwnerName }}" \
              AppName="${{ vars.AppName }}" \
              AppDescription="${{ vars.AppDescription }}"

      - name: Copy src contents to S3 bucket
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name cozyhomeaway-ui-prod \
            --query "Stacks[0].Parameters[?ParameterKey=='BucketName'].ParameterValue" \
            --output text)
          aws s3 sync src/ s3://$BUCKET_NAME/ --delete
