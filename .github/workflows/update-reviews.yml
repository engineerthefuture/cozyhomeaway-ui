name: Update Reviews

on:
  schedule:
    - cron: '0 12 * * *'   # Daily at noon UTC
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit and push reviews.html

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install && npx playwright install chromium --with-deps

      - name: Fetch new reviews
        run: node scripts/update-reviews.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/reviews.html
          if git diff --staged --quiet; then
            echo "No new reviews found."
          else
            COUNT=$(grep -c 'class="review-slide' src/reviews.html)
            git commit -m "chore: add new reviews (${COUNT} total)"
            git push
          fi
