name: Update Reviews

on:
  schedule:
    - cron: '0 12 * * *'   # Daily at noon UTC
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit and push reviews.html
      id-token: write       # Needed for OIDC auth to AWS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install && npx playwright install chromium --with-deps

      - name: Fetch new reviews
        run: node scripts/update-reviews.js

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/reviews.html
          if git diff --staged --quiet; then
            echo "No new reviews found."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            COUNT=$(grep -c 'class="review-slide' src/reviews.html)
            git commit -m "chore: add new reviews (${COUNT} total)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.commit.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.OIDC_ROLE_NAME }}
          aws-region: us-east-1

      - name: Upload reviews.html to S3 and invalidate CloudFront
        if: steps.commit.outputs.changed == 'true'
        run: |
          STACK_NAME="${{ vars.NAMESPACE }}-prod-${{ vars.APP_NAME }}"

          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          aws s3 cp src/reviews.html s3://$BUCKET_NAME/reviews.html \
            --cache-control "no-cache, must-revalidate"

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths '/reviews.html'
